<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Adaptavél</title>
</head>
<body>
    <h1>Imagem que se adapta sozinha</h1>
    <h2>Red Dead Redemption 2</h2>
    <picture>
        <source media="(max-width: 500px)" srcset="img/rdr-p.png">
        <source media="(max-width: 800px)" srcset="img/rdr-m.png">
        <img src="img/rdr-g.png" alt="Read Dead Redemptions 2">
    </picture>
    <h2>Noob Saibot</h2>
    <picture>
        <source media="(max-width: 800px)" srcset="img/noob-p.jpeg">
        <source media="(max-width: 100px)" srcset="img/noob-m.jpeg">
        <img src="img/noob-g.jpeg" alt="Noob Saibot Mortal Kombat">
    </picture>
    <h1>Reproduzindo áudio em HTML5</h1>
    <audio src="midia/Tipo Tobi 🌀 (Naruto)  Style Trap  Prod. Sidney Scaccio  MHRAP.mp3" controls></audio>
</body>
</html>
