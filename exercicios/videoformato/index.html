<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserindo Videos</title>
</head>
<body>
    <h1>Inserindo Videos</h1>
    <p>Para inserir um vídeo em uma página HTML, você pode usar a tag <code>&lt;video&gt;</code>. Aqui está um exemplo de como fazer isso:</p>
    <video src="midia/videoitachi.mp4" controls width="400" poster="img/itachi.webp"></video>
</body>
</html>
